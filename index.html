<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Symbols+2&display=swap" rel="stylesheet">
    <title>SonicPositioner</title>
</head>
<body>
    <div class="content">
        <h1>SonicPositioner</h1>
        <div class="controls">
            <div class="buttons">
                <button id="startBtn">START</button>
                <button id="recordBtn"><span class="icon">●</span></button>
            </div>
            <div class="slider-group">
                <label>Noise Gate Threshold (ノイズ抑制しきい値)</label>
                <input type="range" id="gateSlider" min="0" max="0.1" step="0.001" value="0.01">
                <span id="gateVal" class="val">0.020</span>
            </div>
            <div class="slider-group">
                <label>Master Gain (音量調節)</label>
                <input type="range" id="gainSlider" min="0" max="1.5" step="0.1" value="0.8">
                <span id="gainVal" class="val">0.8</span>
            </div>
        </div>
        <br>
        <canvas id="visualizer" width="400" height="400"></canvas>
    </div>
    <script src="main.js"></script>
</html>
