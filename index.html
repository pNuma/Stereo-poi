<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Symbols+2&display=swap" rel="stylesheet">
    <title>ステレオマイクっぽい</title>
</head>
<body>
    <div class="content">
    <h1 class="logo-title">ステレオマイク<span class="small">っぽい</span></h1>
    <div class="logo-sub">SonicPositioner</div>
        <div class="controls">
            <div class="buttons">
                <select id="micSelect">
                    <option value="" disabled selected>Loading...</option>
                </select>
                <input type="file" id="audioFileInput" accept="audio/*" style="display: none;">
                <button id="fileBtn"><span class="icon">Load File</span></button>
                <button id="recordBtn"><span class="icon">●</span></button>
            </div>
            <div class="slider-group">
                <div class="label-row">
                    <label>Noise Gate Threshold (ノイズ抑制しきい値)</label>
                    <span id="gateVal" class="val">0.020</span>
                </div>
                <input type="range" id="gateSlider" min="0" max="0.1" step="0.001" value="0.01">
            </div>

            <div class="slider-group">
                <div class="label-row">
                    <label>Master Gain (音量調節)</label>
                    <span id="gainVal" class="val">0.8</span>
                </div>
                <input type="range" id="gainSlider" min="0" max="1.5" step="0.1" value="0.8">
            </div>

        </div>
        <br>
        <canvas id="visualizer" width="400" height="400"></canvas>
    </div>
    <script src="main.js"></script>
</html>
