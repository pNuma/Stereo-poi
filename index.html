<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Symbols+2&display=swap" rel="stylesheet">
    <title>STEREO-POI</title>
</head>
<body>
    <div class="content">
        <h1 class="logo-title">STEREO-POI<span class="small">ステレオマイクっぽい</span></h1>
        
        <input type="file" id="audioFileInput" accept="audio/*" style="display: none;">

        <div class="control-panel">
            <div class="input-section">
                <select id="micSelect">
                    <option value="" disabled selected>Select Microphone</option>
                    <option value="no-mic">マイクなし</option>
                </select>
                <button id="fileBtn" class="btn-rect"><span class="icon">Load File</span></button>
            </div>

            <div class="action-section">
                <div id="buttons" class="status">
                <button id="recordBtn" class="btn-rect icon-btn rec-btn"><span class="icon">●</span></button>
                <button id="pauseBtn" class="btn-rect icon-btn"><span class="icon">▶</span></button>
                <button id="resetBtn" class="btn-rect icon-btn"><span class="icon">↺</span></button>
                </div>
                <span id="timeDisplay">0:00 / 0:00</span>
            </div>
        </div>

        <div class="sliders-grid">
            <div class="slider-group">
                <div class="label-row">
                    <label>ノイズ抑制</label>
                    <span id="gateVal" class="val">0.020</span>
                </div>
                <input type="range" id="gateSlider" min="0" max="0.1" step="0.001" value="0.02">
            </div>

            <div class="slider-group">
                <div class="label-row">
                    <label>音量</label>
                    <span id="gainVal" class="val">0.8</span>
                </div>
                <input type="range" id="gainSlider" min="0" max="1.5" step="0.1" value="0.8">
            </div>
        </div>

        <canvas id="visualizer" width="400" height="400"></canvas>
    </div>
    
    <script src="main.js"></script>
</body>
</html>
